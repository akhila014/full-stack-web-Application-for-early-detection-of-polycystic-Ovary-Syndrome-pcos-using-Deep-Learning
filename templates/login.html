<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BVRIT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Admin / Doctor Login</h2>
        <p class="subtitle">Access restricted to authorised personnel only</p>

        {% if error %}
        <div style="background:#ffebee; border:1px solid #ef9a9a; color:#b71c1c;
                    padding:12px 16px; border-radius:6px; margin-bottom:1.2rem;
                    text-align:center; font-weight:600;">
            &#9888; {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="footer-text">
            B V Raju Institute of Technology &mdash; Department of CSE
        </div>
    </div>
</body>
</html>
