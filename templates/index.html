<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCOS Detection | BVRIT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>PCOS Detection System</h2>
        <p class="subtitle">B V Raju Institute of Technology &mdash; Dept. of CSE</p>

        {% if error %}
        <div style="background:#ffebee; border:1px solid #ef9a9a; color:#b71c1c;
                    padding:12px 16px; border-radius:6px; margin-bottom:1.2rem;
                    text-align:center; font-weight:600;">
            &#9888; {{ error }}
        </div>
        {% endif %}

        <form action="/predict" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="age">Patient Age</label>
                <input type="number" id="age" name="age"
                       placeholder="Enter age (e.g. 24)" min="10" max="60" required>
            </div>

            <div class="form-group">
                <label for="symptoms">Clinical Symptoms</label>
                <textarea id="symptoms" name="symptoms"
                          placeholder="Describe symptoms (e.g. irregular periods, acne, hair loss, weight gain...)"
                          required></textarea>
            </div>

            <div class="form-group">
                <label for="ultrasound">Ovarian Ultrasound Image</label>
                <input type="file" id="ultrasound" name="ultrasound"
                       accept=".jpg,.jpeg,.png" required>
                <small style="color:#888; font-size:0.78rem;">
                    Upload a valid ovarian ultrasound scan (JPG/PNG, max 5MB)
                </small>
            </div>

            <button type="submit">Analyse &amp; Predict</button>

        </form>

        <div class="footer-text">
            This tool is for screening purposes only. Always consult a qualified medical professional.
        </div>

        <!-- Doctor login link at bottom -->
        <div style="text-align:center; margin-top:10px;">
            <a href="/login" style="font-size:0.78rem; color:#aaa; text-decoration:none;">
                &#128274; Doctor / Admin Login
            </a>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
